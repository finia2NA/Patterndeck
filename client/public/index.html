<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, viewport-fit=cover" />
    <meta name="theme-color" content="#FDF0E0" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#141517" media="(prefers-color-scheme: dark)" />
    <title>PatternDeck — AI-Powered Language Learning</title>
    <meta name="description" content="PatternDeck is a cross-platform language-learning app with AI-generated grammar explanations, adaptive practice cards, and spaced repetition. Available on iOS, Android, and Web." />

    <!-- Open Graph -->
    <meta property="og:title" content="PatternDeck — AI-Powered Language Learning" />
    <meta property="og:description" content="Master grammar with AI-generated explanations, adaptive practice cards, and spaced repetition." />
    <meta property="og:url" content="https://patterndeck.richardhanss.de" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="PatternDeck" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="PatternDeck — AI-Powered Language Learning" />
    <meta name="twitter:description" content="Master grammar with AI-generated explanations, adaptive practice cards, and spaced repetition." />

    <link rel="canonical" href="https://patterndeck.richardhanss.de" />
    <style id="expo-reset">
      html,
      body {
        height: 100%;
        background-color: #FDF0E0;
      }

      body {
        overflow: hidden;
      }

      #root {
        display: flex;
        height: 100%;
        flex: 1;
      }

      @media (prefers-color-scheme: dark) {
        html,
        body {
          background-color: #141517;
        }
      }
    </style>
    <style id="gc-loader-style">
      #gc-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 26px;
        background: #FDF0E0;
        opacity: 1;
      }

      #gc-loader.gc-loader-hiding {
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease-out;
      }

      #gc-spinner {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        border: 3px solid rgba(232, 114, 12, 0.2);
        border-top-color: #E8720C;
        animation: gc-spin 0.9s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }

      #gc-loader-brand {
        display: flex;
        align-items: center;
        gap: 18px;
      }

      #gc-loader-logo {
        width: 92px;
        height: 92px;
        object-fit: contain;
      }

      #gc-loader-wordmark {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        font-size: 34px;
        font-weight: 700;
        letter-spacing: 0;
        color: rgba(28, 20, 16, 0.9);
      }

      @keyframes gc-spin {
        to {
          transform: rotate(360deg);
        }
      }

      @media (max-width: 480px) {
        #gc-loader-brand {
          flex-direction: column;
          gap: 12px;
        }

        #gc-loader-logo {
          width: 96px;
          height: 96px;
        }

        #gc-loader-wordmark {
          font-size: 30px;
        }
      }

      @media (prefers-color-scheme: dark) {
        #gc-loader {
          background: #141517;
        }

        #gc-loader-wordmark {
          color: rgba(243, 235, 221, 0.9);
        }

        #gc-spinner {
          border-color: rgba(240, 120, 24, 0.2);
          border-top-color: #F07818;
        }
      }
    </style>
    <script>
      (function () {
        var isIOSWebKit =
          /iPad|iPhone|iPod/.test(navigator.userAgent) ||
          (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
        var viewport = document.querySelector('meta[name="viewport"]');

        if (isIOSWebKit && viewport && viewport.content.indexOf('maximum-scale') === -1) {
          viewport.content += ', maximum-scale=1';
        }

        var appReady = false;
        var resourcesLoaded = document.readyState === 'complete';

        function hideLoaderWhenReady() {
          if (!appReady || !resourcesLoaded) return;

          var loader = document.getElementById('gc-loader');
          if (!loader) return;

          loader.classList.add('gc-loader-hiding');
          window.setTimeout(function () {
            if (loader.parentNode) loader.parentNode.removeChild(loader);
          }, 350);
        }

        window.__gcMarkAppReady = function () {
          appReady = true;
          hideLoaderWhenReady();
        };

        function markResourcesLoaded() {
          resourcesLoaded = true;
          hideLoaderWhenReady();
        }

        if (resourcesLoaded) {
          window.setTimeout(markResourcesLoaded, 0);
        } else {
          window.addEventListener('load', markResourcesLoaded, { once: true });
        }
      })();
    </script>
  </head>

  <body>
    <noscript>
      You need to enable JavaScript to run this app.
    </noscript>
    <div id="gc-loader">
      <div id="gc-spinner"></div>
      <div id="gc-loader-brand">
        <picture>
          <source srcset="/logo-mark-dark.svg" media="(prefers-color-scheme: dark)" />
          <img id="gc-loader-logo" src="/logo-mark.svg" alt="" />
        </picture>
        <div id="gc-loader-wordmark">PatternDeck</div>
      </div>
    </div>
    <div id="root"></div>
  </body>
</html>
